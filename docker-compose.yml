services:
  sapient:
    build: .
    container_name: sapient
    ports:
      - "18789:18789"
    volumes:
      - sapient-state:/root/.sapient
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SAPIENT_STATE_DIR=/root/.sapient
      - ORACLE_CONN=skmishra/skmishra@//host.docker.internal:1521/FREEPDB1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  sapient-state:
